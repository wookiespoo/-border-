# Border Protocol — local testnet
# Brings up 3 nodes: bootstrap (with faucet) + relay + compute
#
# Usage:
#   docker compose up --build          # start all nodes
#   docker compose up bootstrap        # start only bootstrap
#   docker compose logs -f relay       # tail relay logs
#   docker compose down -v             # stop + remove volumes
#
# REST endpoints after startup:
#   Bootstrap  http://localhost:5000   (+ faucet at /faucet/drip)
#   Relay      http://localhost:5001
#   Compute    http://localhost:5002
#
# Drip testnet BC:
#   curl -X POST http://localhost:5000/faucet/drip \
#        -H "Content-Type: application/json" \
#        -d '{"address":"BC_your_address_here"}'

version: "3.9"

services:

  # ── Bootstrap node (faucet enabled) ───────────────────────────────────────
  bootstrap:
    build: .
    container_name: border-bootstrap
    command:
      - "--host=0.0.0.0"
      - "--port=5000"
      - "--p2p-port=6000"
      - "--persist=/data/chain.db"
      - "--node-type=RELAY"
      - "--faucet"
    ports:
      - "5000:5000"
      - "6000:6000"
    volumes:
      - bootstrap_data:/data
    environment:
      - BORDER_NETWORK=testnet
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/chain/info')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Relay node ────────────────────────────────────────────────────────────
  relay:
    build: .
    container_name: border-relay
    command:
      - "--host=0.0.0.0"
      - "--port=5000"
      - "--p2p-port=6000"
      - "--persist=/data/chain.db"
      - "--node-type=RELAY"
      - "--peers=bootstrap:6000"
    ports:
      - "5001:5000"
      - "6001:6000"
    volumes:
      - relay_data:/data
    environment:
      - BORDER_NETWORK=testnet
      - PYTHONUNBUFFERED=1
    depends_on:
      bootstrap:
        condition: service_healthy
    restart: unless-stopped

  # ── Compute node ──────────────────────────────────────────────────────────
  compute:
    build: .
    container_name: border-compute
    command:
      - "--host=0.0.0.0"
      - "--port=5000"
      - "--p2p-port=6000"
      - "--persist=/data/chain.db"
      - "--node-type=COMPUTE"
      - "--compute"
      - "--peers=bootstrap:6000"
    ports:
      - "5002:5000"
      - "6002:6000"
    volumes:
      - compute_data:/data
    environment:
      - BORDER_NETWORK=testnet
      - PYTHONUNBUFFERED=1
    depends_on:
      bootstrap:
        condition: service_healthy
    restart: unless-stopped

volumes:
  bootstrap_data:
  relay_data:
  compute_data:
