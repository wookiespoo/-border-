# Border Protocol — testnet
# Bootstrap (with faucet) + relay + compute node
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f bootstrap
#   docker compose down -v
#
# Endpoints:
#   Bootstrap  http://184.94.212.199:5000  (faucet at /faucet/drip)
#   Relay      http://184.94.212.199:5001
#   Compute    http://184.94.212.199:5002

version: "3.9"
services:
  bootstrap:
    build: .
    container_name: border-bootstrap
    command:
      - "--host=0.0.0.0"
      - "--port=5000"
      - "--data-dir=/data"
      - "--faucet"
      - "--verbose"
    ports:
      - "5000:5000"
    volumes:
      - bootstrap_data:/data
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/status')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  relay:
    build: .
    container_name: border-relay
    command:
      - "--host=0.0.0.0"
      - "--port=5000"
      - "--data-dir=/data"
      - "--peers=bootstrap:5000"
      - "--verbose"
    ports:
      - "5001:5000"
    volumes:
      - relay_data:/data
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      bootstrap:
        condition: service_healthy
    restart: unless-stopped

  compute:
    build: .
    container_name: border-compute
    command:
      - "--host=0.0.0.0"
      - "--port=5000"
      - "--data-dir=/data"
      - "--compute"
      - "--peers=bootstrap:5000"
      - "--verbose"
    ports:
      - "5002:5000"
    volumes:
      - compute_data:/data
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      bootstrap:
        condition: service_healthy
    restart: unless-stopped

volumes:
  bootstrap_data:
  relay_data:
  compute_data:
