name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - run: python -m pytest tests/ -q --tb=short --color=yes
      - run: |
          python -c "import border; print('border package OK')"
          python -c "from border.blockchain.chain import BorderChain; print('chain OK')"
          python -c "from border.payments import ChannelManager; print('payments OK')"
          python -c "from border.blockchain.store import ChainStore; print('store OK')"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install ruff
      - run: ruff check border/ --select=E,F,W --ignore=E501,E741 --exit-zero